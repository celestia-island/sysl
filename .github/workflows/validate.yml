name: Validate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          set -e
          # English source files (mandatory)
          for f in LICENSE.txt README.md FAQ.md COMPARISON.md ADOPTERS.md badge.svg i18n/README.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All English source files present."

      - name: Check translations exist for all supported languages
        run: |
          set -e
          LANGS="zhs zht ja ko fr es ru de pt ar"
          for lang in $LANGS; do
            for f in LICENSE.txt README.md FAQ.md; do
              path="i18n/${lang}/${f}"
              test -f "$path" || { echo "MISSING: $path"; exit 1; }
            done
          done
          echo "All translations present for $LANGS."

      - name: Check LICENSE.txt section structure
        run: |
          set -e
          # Verify all 15 sections are present in the English LICENSE
          for i in $(seq 1 15); do
            grep -q "^${i}\." LICENSE.txt || { echo "MISSING section ${i} in LICENSE.txt"; exit 1; }
          done
          echo "All 15 sections present in LICENSE.txt."

      - name: Check LICENSE has required clauses
        run: |
          set -e
          grep -q "DISCLOSURE OF AI GENERATION" LICENSE.txt || { echo "MISSING: Disclosure clause"; exit 1; }
          grep -q "CONTRACT STATUS" LICENSE.txt || { echo "MISSING: Contract status clause"; exit 1; }
          grep -q "PATENT GRANT" LICENSE.txt || { echo "MISSING: Patent grant clause"; exit 1; }
          grep -q "RECIPROCAL DISCLOSURE" LICENSE.txt || { echo "MISSING: Reciprocal disclosure clause"; exit 1; }
          echo "All required clauses present."

      - name: Check no placeholder text in English source
        run: |
          set -e
          ! grep -iq "TODO\|FIXME\|PLACEHOLDER\|TBD" LICENSE.txt || { echo "Found placeholder text in LICENSE.txt"; exit 1; }
          echo "No placeholder text found."

      - name: Check translation files are not empty
        run: |
          set -e
          LANGS="zhs zht ja ko fr es ru de pt ar"
          for lang in $LANGS; do
            for f in LICENSE.txt README.md FAQ.md; do
              path="i18n/${lang}/${f}"
              lines=$(wc -l < "$path")
              test "$lines" -gt 10 || { echo "TOO SHORT: $path ($lines lines)"; exit 1; }
            done
          done
          echo "All translations have reasonable size."
