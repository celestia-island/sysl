<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Synthetic Source License (SySL) — A software license designed for AI-generated code." />
    <meta name="theme-color" content="#6C3CE0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SySL — Synthetic Source License</title>
    <script>
      // Theme init (FOUC prevention)
      (function () {
        var stored = localStorage.getItem("sysl-theme");
        var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        var theme = stored || (prefersLight ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", theme);
      })();

      // GitHub Pages SPA redirect receiver
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
